# Demonstrates the secret-exfiltration.allowed-hosts allowlist (issue #473).
#
# Pair this workflow with a .github/sisakulint.yaml containing:
#
#   secret-exfiltration:
#     allowed-hosts:
#       - api.vendor.example.com
#       - "*.internal.example.com"
#
# When sisakulint is run with that config, the curl calls below send a
# secret to vendor / internal endpoints and would normally be flagged as
# `secret-exfiltration (critical)`. The allowlist suppresses the finding
# because the destination hostname matches a configured allowed entry.
#
# Hosts not on the list (or whose hostname cannot be statically resolved)
# remain flagged — see `secret-exfiltration.yaml` for those patterns.

name: Secret Exfiltration Allowed-Hosts Demo
on:
  workflow_dispatch:

permissions: {}

jobs:
  notify-vendor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Suppressed by allowed-hosts entry "api.vendor.example.com".
      - name: post deploy event to vendor
        run: |
          curl -X POST https://api.vendor.example.com/v1/events \
            -H "Authorization: Bearer ${{ secrets.VENDOR_TOKEN }}" \
            -d '{"event":"deploy"}'

      # Suppressed by "*.internal.example.com" suffix wildcard.
      - name: forward webhook to internal hub
        run: |
          curl -X POST https://hub.internal.example.com/webhooks \
            -H "X-Auth: ${{ secrets.INTERNAL_HMAC }}" \
            -d '{}'
