name: Secret In Log (Safe Samples)

on:
  workflow_dispatch:

jobs:
  # Safe 1: add-mask で明示的にマスク
  safe-with-add-mask:
    runs-on: ubuntu-latest
    steps:
      - name: Extract with add-mask
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          # NOTE: ::add-mask:: only masks through the first newline. For genuine
          # multi-line PEM keys prefer per-line masking (loop over lines) or escape
          # newlines (e.g. %0A) before calling ::add-mask::.
          PRIVATE_KEY=$(echo $GCP_SERVICE_ACCOUNT_KEY | jq -r '.private_key')
          echo "::add-mask::$PRIVATE_KEY"
          echo "GCP Private Key: $PRIVATE_KEY"

  # Safe 2: echo に secret 由来ではない変数を渡す
  safe-unrelated-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Unrelated echo
        env:
          TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          MSG="hello world"
          echo "$MSG"

  # Safe 3: secret を secret-scoped な CLI に渡すのみ（echo しない）
  safe-no-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Use without echo
        env:
          TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          curl -H "Authorization: Bearer $TOKEN" https://api.github.com/user
