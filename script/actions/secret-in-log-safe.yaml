name: Secret In Log (Safe Samples)

on:
  workflow_dispatch:

jobs:
  # Safe 1a: single-line secret (マスクは 1 行分で十分な場合)
  safe-single-line-with-add-mask:
    runs-on: ubuntu-latest
    steps:
      - name: Extract single-line token with add-mask
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          ACCESS_TOKEN=$(echo "$GCP_SERVICE_ACCOUNT_KEY" | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          curl -H "Authorization: Bearer $ACCESS_TOKEN" https://example.com/api

  # Safe 1b: multi-line secret (PEM 等) はエスケープしてからマスクし、生のままログ出力しない
  safe-multiline-with-add-mask:
    runs-on: ubuntu-latest
    steps:
      - name: Extract multi-line PEM with escaped add-mask
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          PRIVATE_KEY=$(echo "$GCP_SERVICE_ACCOUNT_KEY" | jq -r '.private_key')
          # GitHub Actions の ::add-mask:: は改行で打ち切られるため、
          # 複数行の値は %0A 等にエスケープした上でマスクし、
          # さらに行単位でも追加マスクしておくのが確実。
          PRIVATE_KEY_ESCAPED="${PRIVATE_KEY//$'\r'/%0D}"
          PRIVATE_KEY_ESCAPED="${PRIVATE_KEY_ESCAPED//$'\n'/%0A}"
          echo "::add-mask::$PRIVATE_KEY"
          echo "::add-mask::$PRIVATE_KEY_ESCAPED"
          while IFS= read -r line; do
            [ -z "$line" ] || echo "::add-mask::$line"
          done <<< "$PRIVATE_KEY"
          # 以降、PRIVATE_KEY は直接ログへ出力しない。マスク済みの escaped 値を使って Artifact 等へ渡す。

  # Safe 2: echo に secret 由来ではない変数を渡す
  safe-unrelated-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Unrelated echo
        env:
          TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          MSG="hello world"
          echo "$MSG"

  # Safe 3: secret を secret-scoped な CLI に渡すのみ（echo しない）
  safe-no-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Use without echo
        env:
          TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          curl -H "Authorization: Bearer $TOKEN" https://api.github.com/user
