name: Secret In Log (Vulnerable Samples)

# jq による派生 → echo のケースは goat-secret-in-build-log.yml で
# 別途カバー（Case 11 external verification corpus）。
# ここでは goat 側で扱っていない 2 ケース（チェーン伝播 / 直接 echo）のみ扱う。

on:
  workflow_dispatch:

jobs:
  # Case A: 中間変数を介したチェーン伝播
  leak-via-chained-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Chained assignment
        env:
          TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          STEP1="$TOKEN"
          STEP2=$(echo "$STEP1")
          printf "Token: %s\n" "$STEP2"

  # Case B: echo で env 変数を直接出力（derivation なし）
  leak-direct-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Direct echo of secret env
        env:
          SECRET: ${{ secrets.PLAIN_SECRET }}
        run: |
          echo "The value is $SECRET"

  # Case C: cross-step taint via $GITHUB_ENV (Issue #437)
  # 前 step で derivation した値を $GITHUB_ENV に書き込み、後続 step で echo する。
  # taint は step 境界を越えて伝播する。
  leak-cross-step-github-env:
    runs-on: ubuntu-latest
    steps:
      - name: Derive and export via GITHUB_ENV
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          DERIVED=$(echo "$GCP_SERVICE_ACCOUNT_KEY" | jq -r '.access_token')
          echo "TOKEN=$DERIVED" >> $GITHUB_ENV
      - name: Leak the propagated token
        run: |
          echo "got token: $TOKEN"
