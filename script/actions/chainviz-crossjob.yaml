# E2E fixture for leakage-path chain visualization (`-format "{{mermaid .}}"`).
#
# Exercises the cross-job EdgeNeeds case in pkg/core/chain/assembler.go
# (linkCrossJobNeeds): job "produce" writes an untrusted value to
# $GITHUB_OUTPUT (output-clobbering-critical), and downstream job "consume"
# reads it back via needs.produce.outputs.pr_ref and passes it straight into a
# curl URL (request-forgery-critical).
#
# The chain graph draws a `-->|needs|` edge because the producer-side
# output-clobbering record identifies the exposed job output `pr_ref`, and RequestForgeryRule's
# deferred cross-job path keeps SourceOrigin as
# "needs.produce.outputs.pr_ref (tainted via ...)".
name: chainviz cross job
on:
  pull_request_target:
    types: [opened, synchronize]
jobs:
  produce:
    runs-on: ubuntu-latest
    outputs:
      pr_ref: ${{ steps.get_ref.outputs.ref }}
    steps:
      - name: get_ref
        id: get_ref
        run: echo "ref=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
  consume:
    runs-on: ubuntu-latest
    needs: [produce]
    steps:
      - name: use_ref
        run: curl "https://example.com/${{ needs.produce.outputs.pr_ref }}"
