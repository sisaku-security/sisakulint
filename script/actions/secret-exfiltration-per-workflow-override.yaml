# sisakulint:secret-exfiltration.allowed-hosts: api.vendor.example.com, *.internal.example.com
#
# The leading comment above is the per-workflow override directive
# introduced in issue #473. It augments the repo-wide
# .github/sisakulint.yaml `secret-exfiltration.allowed-hosts` list with
# extra trusted destinations that are only relevant for this workflow.
#
# The override is additive — it never widens nor removes globally
# configured entries. Multiple comma- or whitespace-separated entries are
# accepted on a single line; multiple directives in the file are merged.

name: Secret Exfiltration Per-Workflow Override Demo
on:
  workflow_dispatch:

permissions: {}

jobs:
  scoped-vendor-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: post to vendor (allowed only via per-workflow override)
        run: |
          curl -X POST https://api.vendor.example.com/v1/events \
            -H "Authorization: Bearer ${{ secrets.VENDOR_TOKEN }}" \
            -d '{"event":"deploy"}'
