name: dependabot-ecosystem-example
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # This workflow installs Node.js, implying the project uses the npm ecosystem.
      # The repository's dependabot.yaml does not configure npm, so dependabot-ecosystem
      # warns here.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
