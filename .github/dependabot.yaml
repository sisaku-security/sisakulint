version: 2
updates:
  # Maintain dependence for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"

  # Maintain dependence for golang
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
