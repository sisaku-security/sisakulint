name: CI
on: [push, pull_request]
# TODO: Review and add required permissions. Auto-fix sets empty (no permissions) for safety.
permissions: {}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.24.0"
      - name: Check Go sources are formatted
        run: |
          diffs="$(gofmt -d ./pkg/core/*.go ./cmd/sisakulint/*.go)"
          if [[ "$diffs" != "" ]]; then
            echo "$diffs" >&2
          fi
      - name: Install staticcheck
        run: |-
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
