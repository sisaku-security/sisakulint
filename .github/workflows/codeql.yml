name: "CodeQL"
on:
  schedule:
    - cron: "28 4 * * 6"
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest  # GoはLinuxで動作するため、ubuntu-latestを使用
    timeout-minutes: 120    # Goの解析に適したタイムアウトを設定
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]  # Goのみを指定
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v3
        with:
          category: "/language:${{matrix.language}}"
